
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commentguard_api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./src/models:/app/src/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  train:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commentguard_train
    volumes:
      - ./src:/app/src
      - ./src/data:/app/src/data
    command: python src/train.py
    profiles:
      - training